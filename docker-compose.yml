services:
  dragonfly:
    image: dragonflydb/dragonfly
    container_name: orochi-dragonfly
    ports:
      - "6379:6379"
    command: --logtostderr
    ulimits:
      memlock: -1
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: orochi-backend
    ports:
      - "8000:8000"
    environment:
      DRAGONFLY_URL: redis://dragonfly:6379
      SECRET_KEY: ${SECRET_KEY:-dev-change-me}
      NOVITA_API_KEY: ${NOVITA_API_KEY:-}
      NOVITA_URL: ${NOVITA_URL:-https://api.novita.ai/v1/chat/completions}
    depends_on:
      - dragonfly
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: orochi-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
